services:
  - type: static_site
    name: factcheck-client
    buildCommand: npm ci && npm run build
    staticPublishPath: ./build
    rootDir: ./client
    envVars:
      - key: NODE_ENV
        value: production
      - key: REACT_APP_API_URL
        value: https://factcheck-api-gateway.onrender.com
      - key: REACT_APP_FIREBASE_PROJECT_ID
        value: factcheck-1d6e8      - key: REACT_APP_FIREBASE_API_KEY
        sync: false  # Bạn sẽ phải set thủ công trong Render dashboard
      - key: REACT_APP_FIREBASE_AUTH_DOMAIN
        value: factcheck-1d6e8.firebaseapp.com
      - key: REACT_APP_FIREBASE_STORAGE_BUCKET
        value: factcheck-1d6e8.firebasestorage.app
      - key: GENERATE_SOURCEMAP
        value: false
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-XSS-Protection
        value: "1; mode=block"
      - path: /*
        name: Cache-Control
        value: no-cache
      - path: /static/*
        name: Cache-Control
        value: public, max-age=31536000
